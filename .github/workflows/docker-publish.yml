name: Build and Push Docker Images

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: hub
            target: hub-production
            image: alsokolov2/librarian-hub-mcp
          - service: git
            target: git-production
            image: alsokolov2/librarian-git-mcp
          - service: search
            target: search-production
            image: alsokolov2/librarian-search-mcp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=inline

  update-description:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: alsokolov2/librarian-hub-mcp
            short: "Librarian Hub MCP: Core file management, integrity audits, and smart templating."
          - image: alsokolov2/librarian-git-mcp
            short: "Librarian Git MCP: Atomic Git operations and change isolation for AI agents."
          - image: alsokolov2/librarian-search-mcp
            short: "Librarian Search MCP: Semantic AI-powered search and high-speed regex lookup."
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ matrix.image }}
          short-description: ${{ matrix.short }}
          readme-filepath: ./DOCKERHUB.md

  create-github-release:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
