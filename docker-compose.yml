services:
  librarian-mcp:
    build:
      context: .
      target: production
    image: librarian-mcp:latest
    container_name: librarian-mcp
    user: "${USER_ID}:${GROUP_ID}"
    volumes:
      - ${KNOWLEDGE_HUB_PATH}:/app/knowledge-hub
    env_file:
      - .env
    environment:
      - KNOWLEDGE_HUB_PATH=/app/knowledge-hub
    ports:
      - "${PORT}:${PORT}"
    restart: unless-stopped
