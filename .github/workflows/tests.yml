name: CI (Quality & Tests)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Linting
        run: npm run lint

      - name: Run build (check compilation)
        run: npm run build

      - name: Run unit tests
        run: npm test
